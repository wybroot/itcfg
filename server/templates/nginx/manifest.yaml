name: nginx
display_name: Nginx Web 服务器
description: 反向代理和静态资源服务
category: web-server
output_dir: /opt/itcfg/nginx
config_files:
  - path: nginx.conf.tmpl
    target: /etc/nginx/nginx.conf
    owner: root
    mode: "0644"
  - path: conf.d/default.conf.tmpl
    target: /etc/nginx/conf.d/default.conf
    owner: root
    mode: "0644"
dependencies:
  - component: java-app
    reason: "需要后端 Java 服务地址用于反向代理"