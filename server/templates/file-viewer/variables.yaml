variables:
  - name: SERVER_PORT
    label: 服务端口
    type: number
    default: "8081"
    required: true
    min: 1
    max: 65535
    group: 基础配置

  - name: FILE_STORAGE_PATH
    label: 文件存储路径
    type: string
    default: "/data/files"
    required: true
    group: 存储配置

  - name: MAX_FILE_SIZE
    label: 最大文件大小(MB)
    type: number
    default: "50"
    required: false
    min: 1
    max: 1024
    group: 性能配置

  - name: CACHE_ENABLED
    label: 启用缓存
    type: boolean
    default: "true"
    required: false
    group: 性能配置

  - name: CACHE_PATH
    label: 缓存目录
    type: string
    default: "/data/cache"
    required: false
    group: 存储配置

  - name: REDIS_HOST
    label: Redis 主机
    type: string
    default: "127.0.0.1"
    required: false
    group: 缓存连接

  - name: REDIS_PORT
    label: Redis 端口
    type: number
    default: "6379"
    required: false
    group: 缓存连接

  - name: LOG_LEVEL
    label: 日志级别
    type: select
    default: "INFO"
    required: false
    options: ["DEBUG", "INFO", "WARN", "ERROR"]
    group: 日志配置